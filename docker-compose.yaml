services:
  music-tag:
    build:
      context: ./music-tag-web
      dockerfile: compose/local/django/Dockerfile
    container_name: music-tag-web
    ports:
      - "8001:8001"
    volumes:
      - ./music-tag-web:/app
      - /home/godke/Data/MusicDB:/app/media
      - /home/godke/Projects/NeteaseCloudMusic/music_tag_web/config:/app/data
      - /home/godke/Downloads:/app/download
    command: /start
    restart: always
